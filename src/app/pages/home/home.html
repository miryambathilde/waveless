<app-hero-slider [slides]="heroSlides" />

<section class="section section--home" aria-labelledby="home-page-title">
  <div class="container-lg home-layout">
    <aside class="home-layout__filters" aria-label="Filtrar mi b&uacute;squeda">
      <app-filters-panel
        class="home-layout__filters-panel"
        [initial]="filters()"
        (filtersChange)="onFiltersChange($event)"
      />
    </aside>

    <section class="home-layout__content" aria-labelledby="home-page-title">
      <div class="home-layout__intro">
        <h1 id="home-page-title" class="home-layout__title">Vive tus propias aventuras</h1>
        <p class="home-layout__subtitle">
          Para los que les gusta explorar y conocer mundo sin complejos
        </p>
        <button
          type="button"
          class="home-layout__filters-toggle"
          aria-controls="home-filters-drawer"
          aria-haspopup="dialog"
          [attr.aria-expanded]="isFiltersOpen()"
          [attr.aria-label]="isFiltersOpen() ? 'Cerrar menu de filtros' : 'Abrir menu de filtros'"
          (click)="openFilters()"
        >
          <span class="home-layout__filters-toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 7h16M7 12h10M10 17h4" />
            </svg>
          </span>
          <span>Ver filtros</span>
        </button>
      </div>

      <div class="home-layout__grid">
        @for (item of tripsForLayout(); track item.trackId; let i = $index) {
          @if (i === 0) {
            <h2 class="home-layout__section-title home-layout__section-title--grid">Asia</h2>
          }

          @if (i === 3) {
            <h2
              class="home-layout__section-title home-layout__section-title--grid home-layout__section-title--spaced"
            >
              M&aacute;s viajes por Asia
            </h2>
          }

          <app-card
            [description]="item.trip.description"
            [durationBucket]="item.trip.durationBucket"
            [title]="item.trip.title"
            [tag]="item.trip.adventure"
            [price]="formatPrice(item.trip.priceValue)"
            [image]="item.trip.image"
          />
        }
      </div>
    </section>
  </div>

  @if (isFiltersOpen()) {
    <dialog
      #filtersDialog
      open
      class="home-layout__filters-overlay"
      aria-modal="true"
      aria-labelledby="home-filters-title"
      (click)="onFiltersOverlayClick($event)"
      (keydown)="onFiltersKeydown($event)"
    >
      <aside
        id="home-filters-drawer"
        class="home-layout__filters-drawer"
        aria-label="Filtrar mi b&uacute;squeda"
      >
        <h3 id="home-filters-title" class="u-sr-only">Men&uacute; de filtros</h3>
        <button
          #filtersClose
          type="button"
          class="home-layout__filters-close"
          aria-label="Cerrar men&uacute; de filtros"
          (click)="closeFilters()"
        >
          &times;
        </button>

        <app-filters-panel
          class="home-layout__filters-panel home-layout__filters-panel--drawer"
          [initial]="filters()"
          (filtersChange)="onFiltersChange($event)"
        />
      </aside>
    </dialog>
  }
</section>
